name: API + DB Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    # ── НОВОЕ: GHA поднимает Docker контейнер с PostgreSQL ──────────────
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
          POSTGRES_DB:       testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    # ────────────────────────────────────────────────────────────────────

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Создаём таблицу в только что поднятом PostgreSQL
      - name: Apply DB schema
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
        run: node db/seed.js

      # Запускаем тесты — PostgreSQL уже живой на localhost:5432
      - name: Run tests
        env:
          API_URL:      https://petstore.swagger.io/v2
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          HEADLESS:     true
        run: npx playwright test

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 10
